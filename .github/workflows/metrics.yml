name: Update Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dumbCodesOnly
          filename: github-metrics.svg
          base: "header, activity, community, metadata"
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: "markup, programming"
          plugin_languages_limit: 8
          plugin_languages_threshold: "0%"
          plugin_lines: yes
          # Contribution calendar that includes PRIVATE commits
          # (uses the token, so it's accurate unlike public-only widgets)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: "America/New_York"
          output_action: committer
          committer_message: "chore: update metrics"
          committer_branch: main

      # Same data, re-skinned for GitHub's dark theme so the README doesn't
      # show a bright white card when the viewer's GitHub theme is dark.
      # Swapped in via <picture prefers-color-scheme> in README.md.
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dumbCodesOnly
          filename: github-metrics-dark.svg
          base: "header, activity, community, metadata"
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: "markup, programming"
          plugin_languages_limit: 8
          plugin_languages_threshold: "0%"
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: "America/New_York"
          extras_css: |
            svg { background-color: #10151f; }
            svg, .field, footer { color: #d6e0e8 !important; }
            h1, h2, h3 { color: #00e5a0 !important; }
            .field svg { fill: #7c8cff !important; }
            footer { color: #7a8899 !important; }
          output_action: committer
          committer_message: "chore: update metrics (dark)"
          committer_branch: main
